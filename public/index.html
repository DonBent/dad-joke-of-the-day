<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Joke of the Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px;
      max-width: 600px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12); text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 12px; }
    h1 { font-size: 1.4rem; color: #888; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
    .tab {
      padding: 8px 20px; border-radius: 20px; border: 2px solid #eee;
      background: #fafafa; color: #888; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .tab.active { background: #ff6b35; color: white; border-color: #ff6b35; }
    .category-filter { margin-bottom: 20px; }
    .category-filter select {
      padding: 8px 16px; border-radius: 8px; border: 2px solid #eee;
      font-size: 0.95rem; color: #555; cursor: pointer; outline: none; background: #fafafa;
    }
    .category-filter select:focus { border-color: #ff6b35; }
    #joke-date { font-size: 0.8rem; color: #bbb; margin-bottom: 4px; visibility: hidden; }
    #joke-text {
      font-size: 1.35rem; color: #333; line-height: 1.6;
      min-height: 80px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 14px;
    }
    .meta-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 24px;
    }
    .badge {
      background: #fff3ec; color: #ff6b35; border: 1px solid #ffd5bf;
      border-radius: 20px; padding: 4px 14px; font-size: 0.8rem;
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      visibility: hidden;
    }
    .upvote-btn {
      background: #f9f9f9; border: 2px solid #eee; border-radius: 20px;
      padding: 4px 14px; font-size: 0.85rem; color: #888;
      cursor: pointer; transition: all 0.2s; visibility: hidden;
    }
    .upvote-btn:hover { border-color: #ff6b35; color: #ff6b35; background: #fff3ec; }
    .upvote-btn.voted { background: #fff3ec; color: #ff6b35; border-color: #ff6b35; }
    .actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
    button.primary {
      background: #ff6b35; color: white; border: none;
      border-radius: 8px; padding: 12px 28px; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button.primary:hover { background: #e55a26; }
    button.primary:active { transform: scale(0.97); }
    #share-btn {
      background: #f0f0f0; color: #555; border: none; border-radius: 8px;
      padding: 12px 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    #share-btn:hover { background: #e0e0e0; }
    #share-btn.copied { background: #d4f5d4; color: #2a7a2a; }
    .loading { color: #aaa; font-style: italic; }
    .archive { margin-top: 36px; text-align: left; }
    .archive h2 { font-size: 1rem; color: #aaa; margin-bottom: 16px; text-align: center; }
    .archive-item {
      background: #fafafa; border-radius: 10px; padding: 14px 18px;
      margin-bottom: 10px; border-left: 4px solid #ffd5bf;
      cursor: pointer; transition: border-color 0.15s;
    }
    .archive-item:hover { border-color: #ff6b35; }
    .archive-date { font-size: 0.75rem; color: #bbb; font-weight: 600; margin-bottom: 4px; }
    .archive-joke { font-size: 0.95rem; color: #555; line-height: 1.5; }
    .archive-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .archive-cat { font-size: 0.7rem; color: #ff6b35; font-weight: 600; text-transform: uppercase; }
    .archive-votes { font-size: 0.75rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">😄</div>
    <h1>Dad Joke of the Day</h1>
    <div class="tabs">
      <div class="tab active" id="tab-today" onclick="switchTab('today')">📅 Today's Joke</div>
      <div class="tab" id="tab-random" onclick="switchTab('random')">🎲 Random</div>
    </div>
    <div id="random-controls" style="display:none" class="category-filter">
      <select id="category-select" onchange="fetchRandom()">
        <option value="">All categories</option>
      </select>
    </div>
    <div id="joke-date"></div>
    <div id="joke-text" class="loading">Loading a joke...</div>
    <div class="meta-row">
      <div id="joke-badge" class="badge">—</div>
      <button class="upvote-btn" id="upvote-btn" onclick="upvote()">👍 <span id="vote-count">0</span></button>
    </div>
    <div class="actions">
      <button class="primary" id="action-btn" onclick="onAction()">Another one! 👴</button>
      <button id="share-btn" onclick="shareJoke()">🔗 Share</button>
    </div>
    <div class="archive" id="archive-section">
      <h2>📖 Last 7 Days</h2>
      <div id="archive-list"></div>
    </div>
  </div>

  <script>
    let currentTab = 'today';
    let currentJokeId = null;

    async function loadCategories() {
      try {
        const cats = await (await fetch('/api/categories')).json();
        const sel = document.getElementById('category-select');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
          sel.appendChild(opt);
        });
      } catch(e) {}
    }

    function showJoke(data) {
      document.getElementById('joke-text').className = '';
      document.getElementById('joke-text').textContent = data.joke;
      document.getElementById('joke-badge').textContent = data.category;
      document.getElementById('joke-badge').style.visibility = 'visible';
      document.getElementById('upvote-btn').style.visibility = 'visible';
      document.getElementById('upvote-btn').classList.remove('voted');
      document.getElementById('vote-count').textContent = data.votes || 0;
      currentJokeId = data.id;
      history.replaceState(null, '', `#joke-${data.id}`);
      const dateEl = document.getElementById('joke-date');
      if (data.date) { dateEl.textContent = data.date; dateEl.style.visibility = 'visible'; }
      else dateEl.style.visibility = 'hidden';
    }

    async function upvote() {
      if (!currentJokeId) return;
      const res = await fetch(`/api/joke/${currentJokeId}/upvote`, { method: 'POST' });
      const data = await res.json();
      document.getElementById('vote-count').textContent = data.votes;
      document.getElementById('upvote-btn').classList.add('voted');
    }

    async function fetchToday() {
      document.getElementById('joke-text').className = 'loading';
      document.getElementById('joke-text').textContent = "Loading today's joke...";
      document.getElementById('joke-badge').style.visibility = 'hidden';
      document.getElementById('upvote-btn').style.visibility = 'hidden';
      showJoke(await (await fetch('/api/joke/today')).json());
    }

    async function fetchRandom() {
      const el = document.getElementById('joke-text');
      el.className = 'loading'; el.textContent = 'Loading a joke...';
      document.getElementById('joke-badge').style.visibility = 'hidden';
      document.getElementById('upvote-btn').style.visibility = 'hidden';
      document.getElementById('joke-date').style.visibility = 'hidden';
      const category = document.getElementById('category-select').value;
      const url = category ? `/api/joke?category=${encodeURIComponent(category)}` : '/api/joke';
      showJoke(await (await fetch(url)).json());
    }

    async function fetchById(id) {
      const data = await (await fetch(`/api/joke/${id}`)).json();
      if (!data.error) showJoke(data);
    }

    async function loadArchive() {
      try {
        const days = await (await fetch('/api/archive?days=7')).json();
        document.getElementById('archive-list').innerHTML = days.map(d => `
          <div class="archive-item" onclick="loadSharedJoke(${d.id})">
            <div class="archive-date">${d.date}</div>
            <div class="archive-joke">${d.joke}</div>
            <div class="archive-footer">
              <div class="archive-cat">${d.category}</div>
              <div class="archive-votes">👍 ${d.votes || 0}</div>
            </div>
          </div>`).join('');
      } catch(e) {}
    }

    function loadSharedJoke(id) { switchTab('random'); fetchById(id); }

    function shareJoke() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('share-btn');
        btn.textContent = '✅ Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '🔗 Share'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => prompt('Copy this link:', window.location.href));
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-today').className = 'tab' + (tab === 'today' ? ' active' : '');
      document.getElementById('tab-random').className = 'tab' + (tab === 'random' ? ' active' : '');
      document.getElementById('random-controls').style.display = tab === 'random' ? 'block' : 'none';
      document.getElementById('action-btn').textContent = tab === 'today' ? "↻ Reload today's joke" : 'Another one! 👴';
      document.getElementById('archive-section').style.display = tab === 'today' ? 'block' : 'none';
      if (tab === 'today') { fetchToday(); loadArchive(); } else fetchRandom();
    }

    function onAction() { if (currentTab === 'today') fetchToday(); else fetchRandom(); }

    async function init() {
      await loadCategories();
      const hash = window.location.hash;
      const match = hash.match(/^#joke-(\d+)$/);
      if (match) {
        await fetchById(parseInt(match[1]));
        switchTab('random');
      } else switchTab('today');
    }

    init();
  </script>
</body>
</html>
<!-- submission styles + form injected by v6 -->
<style>
  .submit-section { margin-top: 32px; border-top: 1px solid #f0f0f0; padding-top: 24px; }
  .submit-toggle {
    background: none; border: 2px dashed #eee; border-radius: 10px;
    color: #aaa; width: 100%; padding: 12px; font-size: 0.9rem;
    cursor: pointer; transition: all 0.2s;
  }
  .submit-toggle:hover { border-color: #ff6b35; color: #ff6b35; background: #fff8f5; }
  .submit-form { display: none; margin-top: 16px; text-align: left; }
  .submit-form.open { display: block; }
  .submit-form textarea, .submit-form select {
    width: 100%; border: 2px solid #eee; border-radius: 8px;
    padding: 10px 14px; font-size: 0.95rem; color: #444;
    margin-bottom: 10px; outline: none; font-family: inherit;
  }
  .submit-form textarea { resize: vertical; min-height: 70px; }
  .submit-form textarea:focus, .submit-form select:focus { border-color: #ff6b35; }
  .submit-form button.submit-btn {
    background: #ff6b35; color: white; border: none; border-radius: 8px;
    padding: 10px 24px; font-size: 0.9rem; cursor: pointer; width: 100%;
  }
  .submit-form button.submit-btn:hover { background: #e55a26; }
  .submit-msg { margin-top: 8px; font-size: 0.85rem; color: #2a7a2a; }
  .submit-msg.error { color: #c00; }
</style>
<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    // Inject submission section after card
    const card = document.querySelector('.card');
    const section = document.createElement('div');
    section.className = 'submit-section';
    section.innerHTML = `
      <button class="submit-toggle" onclick="toggleSubmit()">✍️ Got a dad joke? Submit it!</button>
      <div class="submit-form" id="submit-form">
        <textarea id="sub-joke" placeholder="Your joke here (be groan-worthy)..."></textarea>
        <select id="sub-cat">
          <option value="general">General</option>
          <option value="science">Science</option>
          <option value="food">Food</option>
          <option value="animals">Animals</option>
          <option value="wordplay">Wordplay</option>
        </select>
        <button class="submit-btn" onclick="submitJoke()">Submit Joke 🎤</button>
        <div class="submit-msg" id="sub-msg"></div>
      </div>`;
    card.appendChild(section);
  });
  window.toggleSubmit = function() {
    document.getElementById('submit-form').classList.toggle('open');
  };
  window.submitJoke = async function() {
    const joke = document.getElementById('sub-joke').value.trim();
    const category = document.getElementById('sub-cat').value;
    const msg = document.getElementById('sub-msg');
    msg.className = 'submit-msg'; msg.textContent = '';
    if (joke.length < 10) { msg.className = 'submit-msg error'; msg.textContent = 'Joke too short!'; return; }
    try {
      const res = await fetch('/api/submit', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ joke, category })
      });
      const data = await res.json();
      if (res.ok) {
        msg.textContent = data.message;
        document.getElementById('sub-joke').value = '';
        setTimeout(() => document.getElementById('submit-form').classList.remove('open'), 3000);
      } else {
        msg.className = 'submit-msg error'; msg.textContent = data.error;
      }
    } catch(e) { msg.className = 'submit-msg error'; msg.textContent = 'Failed to submit. Try again.'; }
  };
})();
</script>
<!-- search injected by v7 -->
<style>
  .search-section { margin-top: 20px; }
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1; border: 2px solid #eee; border-radius: 8px;
    padding: 10px 14px; font-size: 0.95rem; color: #444; outline: none;
  }
  .search-row input:focus { border-color: #ff6b35; }
  .search-row button {
    background: #ff6b35; color: white; border: none;
    border-radius: 8px; padding: 10px 18px; font-size: 0.9rem; cursor: pointer;
  }
  .search-row button:hover { background: #e55a26; }
  .search-results { margin-top: 14px; text-align: left; }
  .search-result-item {
    background: #fafafa; border-radius: 10px; padding: 12px 16px;
    margin-bottom: 8px; border-left: 4px solid #ffecd2;
    cursor: pointer; transition: border-color 0.15s;
  }
  .search-result-item:hover { border-color: #ff6b35; }
  .search-result-joke { font-size: 0.95rem; color: #444; }
  .search-result-cat { font-size: 0.72rem; color: #ff6b35; font-weight: 600; text-transform: uppercase; margin-top: 3px; }
  .search-count { font-size: 0.8rem; color: #bbb; margin-bottom: 10px; }
</style>
<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    const card = document.querySelector('.card');
    const section = document.createElement('div');
    section.className = 'search-section';
    section.innerHTML = `
      <div class="search-row">
        <input id="search-input" type="text" placeholder="🔍 Search jokes..." onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">Search</button>
      </div>
      <div class="search-results" id="search-results"></div>`;
    // Insert before submit section
    const submitSec = card.querySelector('.submit-section');
    if (submitSec) card.insertBefore(section, submitSec);
    else card.appendChild(section);
  });
  window.doSearch = async function() {
    const q = document.getElementById('search-input').value.trim();
    const container = document.getElementById('search-results');
    if (!q) { container.innerHTML = ''; return; }
    try {
      const data = await (await fetch(`/api/search?q=${encodeURIComponent(q)}`)).json();
      if (!data.results.length) { container.innerHTML = '<div class="search-count">No jokes found.</div>'; return; }
      container.innerHTML = `<div class="search-count">${data.count} result${data.count !== 1 ? 's' : ''}</div>` +
        data.results.map(j => `
          <div class="search-result-item" onclick="loadSearchJoke(${j.id})">
            <div class="search-result-joke">${j.joke}</div>
            <div class="search-result-cat">${j.category} · 👍 ${j.votes}</div>
          </div>`).join('');
    } catch(e) { container.innerHTML = '<div class="search-count">Search failed.</div>'; }
  };
  window.loadSearchJoke = function(id) {
    if (typeof fetchById === 'function') fetchById(id);
    if (typeof switchTab === 'function') switchTab('random');
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-input').value = '';
  };
})();
</script>
