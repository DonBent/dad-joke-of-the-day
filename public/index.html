<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Joke of the Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; color: #888; margin-bottom: 24px; letter-spacing: 0.5px; }
    .category-filter {
      margin-bottom: 20px;
    }
    .category-filter select {
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid #eee;
      font-size: 0.95rem;
      color: #555;
      cursor: pointer;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    .category-filter select:focus { border-color: #ff6b35; }
    #joke-text {
      font-size: 1.4rem;
      color: #333;
      line-height: 1.6;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-block;
      background: #fff3ec;
      color: #ff6b35;
      border: 1px solid #ffd5bf;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    button {
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #e55a26; }
    button:active { transform: scale(0.97); }
    .loading { color: #aaa; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">😄</div>
    <h1>Dad Joke of the Day</h1>
    <div class="category-filter">
      <select id="category-select" onchange="fetchJoke()">
        <option value="">All categories</option>
      </select>
    </div>
    <div id="joke-text" class="loading">Loading a joke...</div>
    <div id="joke-badge" class="badge" style="visibility:hidden">—</div>
    <button onclick="fetchJoke()">Another one! 👴</button>
  </div>

  <script>
    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        const cats = await res.json();
        const sel = document.getElementById('category-select');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
          sel.appendChild(opt);
        });
      } catch(e) {}
    }

    async function fetchJoke() {
      const el = document.getElementById('joke-text');
      const badge = document.getElementById('joke-badge');
      const category = document.getElementById('category-select').value;
      el.className = 'loading';
      el.textContent = 'Loading a joke...';
      badge.style.visibility = 'hidden';
      try {
        const url = category ? `/api/joke?category=${encodeURIComponent(category)}` : '/api/joke';
        const res = await fetch(url);
        const data = await res.json();
        el.className = '';
        el.textContent = data.joke;
        badge.textContent = data.category;
        badge.style.visibility = 'visible';
      } catch (e) {
        el.textContent = 'Oops, the joke escaped. Try again!';
      }
    }

    loadCategories().then(() => fetchJoke());
  </script>
</body>
</html>
